version: "3"

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  install:
    desc: Install frontend dependencies
    deps:
      - frontend:install

  dev:
    desc: Run the frontend development server
    deps:
      - frontend:dev

  start:
    desc: Build and run the frontend production server
    deps:
      - frontend:start

  check:
    desc: Run frontend lint, typecheck, and build
    deps:
      - frontend:check

  frontend:install:
    desc: Install frontend dependencies
    dir: frontend
    cmds:
      - npm install

  frontend:dev:
    desc: Run Next.js on port 4000
    dir: frontend
    cmds:
      - npm run dev -- -p 4000 -H 0.0.0.0

  frontend:start:
    desc: Build and run Next.js production server on port 4000
    dir: frontend
    cmds:
      - npm run build
      - npm exec next start -- -p 4000 -H 0.0.0.0

  frontend:check:
    desc: Run frontend lint, typecheck, and build
    dir: frontend
    cmds:
      - npm run lint
      - npm run typecheck
      - npm run build
